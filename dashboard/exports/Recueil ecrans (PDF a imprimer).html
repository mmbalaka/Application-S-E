  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+FFFD;\n}\n\n\n:root {\n  --font-display: 'Newsreader', 'Tiempos Headline', Garamond, 'Times New Roman', serif;\n  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n}\n<\u002Fstyle>\n  <style>/* ──────────────────────────────────────────────────────────────\n   Colors — Claude / Anthropic warm-editorial palette\n   Base hues first, then semantic aliases. Reference semantic\n   aliases in components; never inline hex.\n   ────────────────────────────────────────────────────────────── */\n\n:root {\n  /* ── Brand & accent ─────────────────────────────── */\n  --coral: #cc785c;            /* signature Anthropic warm coral */\n  --coral-active: #a9583e;     /* press / darker variant */\n  --coral-disabled: #e6dfd8;   /* desaturated cream-tinted */\n  --accent-teal: #5db8a6;\n  --accent-amber: #e8a55a;\n\n  /* ── Surfaces ───────────────────────────────────── */\n  --canvas: #faf9f5;               /* default tinted-cream floor */\n  --surface-soft: #f5f0e8;         /* soft band background */\n  --surface-card: #efe9de;         /* feature / content cards */\n  --surface-cream-strong: #e8e0d2; /* selected tabs, emphasized bands */\n  --surface-dark: #181715;         /* code mockups, footer */\n  --surface-dark-elevated: #252320;/* elevated cards on dark */\n  --surface-dark-soft: #1f1e1b;    /* code-block background on dark */\n\n  /* ── Hairlines ──────────────────────────────────── */\n  --hairline: #e6dfd8;\n  --hairline-soft: #ebe6df;\n\n  /* ── Text ───────────────────────────────────────── */\n  --ink: #141413;          /* headlines, primary text */\n  --body-strong: #252523;  /* emphasized paragraphs */\n  --body: #3d3d3a;          /* default running text */\n  --muted: #6c6a64;         /* sub-headings, secondary */\n  --muted-soft: #8e8b82;    /* captions, fine print */\n  --on-primary: #ffffff;    /* text on coral */\n  --on-dark: #faf9f5;       /* cream-white on dark */\n  --on-dark-soft: #a09d96;  /* secondary on dark */\n\n  /* ── Semantic status ────────────────────────────── */\n  --success: #5db872;\n  --warning: #d4a017;\n  --error: #c64545;\n\n  /* ── Aliases used by components ─────────────────── */\n  --primary: var(--coral);\n  --primary-active: var(--coral-active);\n  --primary-disabled: var(--coral-disabled);\n  --text-heading: var(--ink);\n  --text-body: var(--body);\n  --text-muted: var(--muted);\n  --border-default: var(--hairline);\n  --focus-ring: rgba(204, 120, 92, 0.18);\n}\n<\u002Fstyle>\n  <style>/* ──────────────────────────────────────────────────────────────\n   Typography scale — editorial display serif + humanist body sans\n   Display sizes stay weight 400 with negative tracking.\n   ────────────────────────────────────────────────────────────── */\n\n:root {\n  /* Display — Newsreader serif (≈ Copernicus), weight 400 */\n  --display-xl-size: 64px;  --display-xl-lh: 1.05 /* @kind other */; --display-xl-ls: -1.5px;\n  --display-lg-size: 48px;  --display-lg-lh: 1.1 /* @kind other */;  --display-lg-ls: -1px;\n  --display-md-size: 36px;  --display-md-lh: 1.15 /* @kind other */; --display-md-ls: -0.5px;\n  --display-sm-size: 28px;  --display-sm-lh: 1.2 /* @kind other */;  --display-sm-ls: -0.3px;\n\n  /* Title — Inter sans, weight 500 */\n  --title-lg-size: 22px; --title-lg-lh: 1.3 /* @kind other */;\n  --title-md-size: 18px; --title-md-lh: 1.4 /* @kind other */;\n  --title-sm-size: 16px; --title-sm-lh: 1.4 /* @kind other */;\n\n  /* Body — Inter sans, weight 400 */\n  --body-md-size: 16px; --body-md-lh: 1.55 /* @kind other */;\n  --body-sm-size: 14px; --body-sm-lh: 1.55 /* @kind other */;\n\n  /* Detail */\n  --caption-size: 13px;          --caption-lh: 1.4 /* @kind other */;\n  --caption-upper-size: 12px;    --caption-upper-lh: 1.4 /* @kind other */; --caption-upper-ls: 1.5px;\n  --code-size: 14px;             --code-lh: 1.6 /* @kind other */;\n  --button-size: 14px;\n  --nav-link-size: 14px;         --nav-link-lh: 1.4 /* @kind other */;\n\n  --weight-regular: 400 /* @kind other */;\n  --weight-medium: 500 /* @kind other */;\n  --weight-semibold: 600 /* @kind other */;\n}\n\n/* ── Reusable type helpers ──────────────────────────── */\n.t-display-xl { font-family: var(--font-display); font-weight: 400; font-size: var(--display-xl-size); line-height: var(--display-xl-lh); letter-spacing: var(--display-xl-ls); color: var(--ink); }\n.t-display-lg { font-family: var(--font-display); font-weight: 400; font-size: var(--display-lg-size); line-height: var(--display-lg-lh); letter-spacing: var(--display-lg-ls); color: var(--ink); }\n.t-display-md { font-family: var(--font-display); font-weight: 400; font-size: var(--display-md-size); line-height: var(--display-md-lh); letter-spacing: var(--display-md-ls); color: var(--ink); }\n.t-display-sm { font-family: var(--font-display); font-weight: 400; font-size: var(--display-sm-size); line-height: var(--display-sm-lh); letter-spacing: var(--display-sm-ls); color: var(--ink); }\n.t-title-lg { font-family: var(--font-body); font-weight: 500; font-size: var(--title-lg-size); line-height: var(--title-lg-lh); color: var(--ink); }\n.t-title-md { font-family: var(--font-body); font-weight: 500; font-size: var(--title-md-size); line-height: var(--title-md-lh); color: var(--ink); }\n.t-title-sm { font-family: var(--font-body); font-weight: 500; font-size: var(--title-sm-size); line-height: var(--title-sm-lh); color: var(--ink); }\n.t-body-md { font-family: var(--font-body); font-weight: 400; font-size: var(--body-md-size); line-height: var(--body-md-lh); color: var(--body); }\n.t-body-sm { font-family: var(--font-body); font-weight: 400; font-size: var(--body-sm-size); line-height: var(--body-sm-lh); color: var(--body); }\n.t-caption { font-family: var(--font-body); font-weight: 500; font-size: var(--caption-size); line-height: var(--caption-lh); }\n.t-caption-upper { font-family: var(--font-body); font-weight: 500; font-size: var(--caption-upper-size); line-height: var(--caption-upper-lh); letter-spacing: var(--caption-upper-ls); text-transform: uppercase; }\n.t-code { font-family: var(--font-mono); font-weight: 400; font-size: var(--code-size); line-height: var(--code-lh); }\n<\u002Fstyle>\n  <style>/* ──────────────────────────────────────────────────────────────\n   Spacing, radius & elevation\n   Base unit 4px. Section rhythm 96px.\n   ────────────────────────────────────────────────────────────── */\n\n:root {\n  /* Spacing scale */\n  --space-xxs: 4px;\n  --space-xs: 8px;\n  --space-sm: 12px;\n  --space-md: 16px;\n  --space-lg: 24px;\n  --space-xl: 32px;\n  --space-xxl: 48px;\n  --space-section: 96px;\n\n  /* Border radius */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;   /* buttons, inputs, tabs */\n  --radius-lg: 12px;  /* content & product cards */\n  --radius-xl: 16px;  /* hero illustration container */\n  --radius-pill: 9999px;\n  --radius-full: 9999px;\n\n  /* Elevation — color-block first, shadow rare */\n  --shadow-none: none;\n  --shadow-soft: 0 1px 3px rgba(20, 20, 19, 0.08);\n  --shadow-card: 0 2px 12px rgba(20, 20, 19, 0.06);\n\n  /* Layout */\n  --container-max: 1200px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(0.32, 0.08, 0.24, 1) /* @kind other */;\n  --duration-fast: 120ms /* @kind other */;\n  --duration-base: 200ms /* @kind other */;\n}\n<\u002Fstyle>\n  <style>/* ──────────────────────────────────────────────────────────────\n   Claude Design System — global entry point\n   Consumers link this single file. Keep it as @import lines only.\n   ────────────────────────────────────────────────────────────── */\n\n/* ──────────────────────────────────────────────────────────────\n   Fonts — webfont loading + family aliases\n\n   Brand faces (Copernicus / StyreneB) are licensed Anthropic\n   typefaces and not publicly available. Substitutes:\n     • Display serif  →  Newsreader   (≈ Copernicus / Tiempos Headline)\n     • Body sans ───────────── */\n\n:root {\n  /* ── Brand & accent ─────────────────────────────── */\n  --coral: #cc785c;            /* signature Anthropic warm coral */\n  --coral-active: #a9583e;     /* press / darker variant */\n  --coral-disabled: #e6dfd8;   /* desaturated cream-tinted */\n  --accent-teal: #5db8a6;\n  --accent-amber: #e8a55a;\n\n  /* ── Surfaces ───────────────────────────────────── */\n  --canvas: #faf9f5;               /* default tinted-cream floor */\n  --surface-soft: #f5f0e8;         /* soft band background */\n  --surface-card: #efe9de;         /* feature / content cards */\n  --surface-cream-strong: #e8e0d2; /* selected tabs, emphasized bands */\n  --surface-dark: #181715;         /* code mockups, footer */\n  --surface-dark-elevated: #252320;/* elevated cards on dark */\n  --surface-dark-soft: #1f1e1b;    /* code-block background on dark */\n\n  /* ── Hairlines ──────────────────────────────────── */\n  --hairline: #e6dfd8;\n  --hairline-soft: #ebe6df;\n\n  /* ── Text ───────────────────────────────────────── */\n  --ink: #141413;          /* headlines, primary text */\n  --body-strong: #252523;  /* emphasized paragraphs */\n  --body: #3d3d3a;          /* default running text */\n  --muted: #6c6a64;         /* sub-headings, secondary */\n  --muted-soft: #8e8b82;    /* captions, fine print */\n  --on-primary: #ffffff;    /* text on coral */\n  --on-dark: #faf9f5;       /* cream-white on dark */\n  --on-dark-soft: #a09d96;  /* secondary on dark */\n\n  /* ── Semantic status ────────────────────────────── */\n  --success: #5db872;\n  --warning: #d4a017;\n  --error: #c64545;\n\n  /* ── Aliases used by components ─────────────────── */\n  --primary: var(--coral);\n  --primary-active: var(--coral-active);\n  --primary-disabled: var(--coral-disabled);\n  --text-heading: var(--ink);\n  --text-body: var(--body);\n  --text-muted: var(--muted);\n  --border-default: var(--hairline);\n  --focus-ring: rgba(204, 120, 92, 0.18);\n}\n\n/* ──────────────────────────────────────────────────────────────\n   Typography scale — editorial display serif + humanist body sans\n   Display sizes stay weight 400 with negative tracking.\n   ────────────────────────────────────────────────────────────── */\n\n:root {\n  /* Display — Newsreader serif (≈ Copernicus), weight 400 */\n  --display-xl-size: 64px;  --display-xl-lh: 1.05 /* @kind other */; --display-xl-ls: -1.5px;\n  --display-lg-size: 48px;  --display-lg-lh: 1.1 /* @kind other */;  --display-lg-ls: -1px;\n  --display-md-size: 36px;  --display-md-lh: 1.15 /* @kind other */; --display-md-ls: -0.5px;\n  --display-sm-size: 28px;  --display-sm-lh: 1.2 /* @kind other */;  --display-sm-ls: -0.3px;\n\n  /* Title — Inter sans, weight 500 */\n  --title-lg-size: 22px; --title-lg-lh: 1.3 /* @kind other */;\n  --title-md-size: 18px; --title-md-lh: 1.4 /* @kind other */;\n  --title-sm-size: 16px; --title-sm-lh: 1.4 /* @kind other */;\n\n  /* Body — Inter sans, weight 400 */\n  --body-md-size: 16px; --body-md-lh: 1.55 /* @kind other */;\n  --body-sm-size: 14px; --body-sm-lh: 1.55 /* @kind other */;\n\n  /* Detail */\n  --caption-size: 13px;          --caption-lh: 1.4 /* @kind other */;\n  --caption-upper-size: 12px;    --caption-upper-lh: 1.4 /* @kind other */; --caption-upper-ls: 1.5px;\n  --code-size: 14px;             --code-lh: 1.6 /* @kind other */;\n  --button-size: 14px;\n  --nav-link-size: 14px;         --nav-link-lh: 1.4 /* @kind other */;\n\n  --weight-regular: 400 /* @kind other */;\n  --weight-medium: 500 /* @kind other */;\n  --weight-semibold: 600 /* @kind other */;\n}\n\n/* ── Reusable type helpers ──────────────────────────── */\n.t-display-xl { font-family: var(--font-display); font-weight: 400; font-size: var(--display-xl-size); line-height: var(--display-xl-lh); letter-spacing: var(--display-xl-ls); color: var(--ink); }\n.t-display-lg { font-family: var(--font-display); font-weight: 400; font-size: var(--display-lg-size); line-height: var(--display-lg-lh); letter-spacing: var(--display-lg-ls); color: var(--ink); }\n.t-display-md { font-family: var(--font-display); font-weight: 400; font-size: var(--display-md-size); line-height: var(--display-md-lh); letter-spacing: var(--display-md-ls); color: var(--ink); }\n.t-display-sm { font-family: var(--font-display); font-weight: 400; font-size: var(--display-sm-size); line-height: var(--display-sm-lh); letter-spacing: var(--display-sm-ls); color: var(--ink); }\n.t-title-lg { font-family: var(--font-body); font-weight: 500; font-size: var(--title-lg-size); line-height: var(--title-lg-lh); color: var(--ink); }\n.t-title-md { font-family: var(--font-body); font-weight: 500; font-size: var(--title-md-size); line-height: var(--title-md-lh); color: var(--ink); }\n.t-title-sm { font-family: var(--font-body); font-weight: 500; font-size: var(--title-sm-size); line-height: var(--title-sm-lh); color: var(--ink); }\n.t-body-md { font-family: var(--font-body); font-weight: 400; font-size: var(--body-md-size); line-height: var(--body-md-lh); color: var(--body); }\n.t-body-sm { font-family: var(--font-body); font-weight: 400; font-size: var(--body-sm-size); line-height: var(--body-sm-lh); color: var(--body); }\n.t-caption { font-family: var(--font-body); font-weight: 500; font-size: var(--caption-size); line-height: var(--caption-lh); }\n.t-caption-upper { font-family: var(--font-body); font-weight: 500; font-size: var(--caption-upper-size); line-height: var(--caption-upper-lh); letter-spacing: var(--caption-upper-ls); text-transform: uppercase; }\n.t-code { font-family: var(--font-mono); font-weight: 400; font-size: var(--code-size); line-height: var(--code-lh); }\n\n/* ──────────────────────────────────────────────────────────────\n   Spacing, radius & elevation\n   Base unit 4px. Section rhythm 96px.\n   ────────────────────────────────────────────────────────────── */\n\n:root {\n  /* Spacing scale */\n  --space-xxs: 4px;\n  --space-xs: 8px;\n  --space-sm: 12px;\n  --space-md: 16px;\n  --space-lg: 24px;\n  --space-xl: 32px;\n  --space-xxl: 48px;\n  --space-section: 96px;\n\n  /* Border radius */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;   /* buttons, inputs, tabs */\n  --radius-lg: 12px;  /* content & product cards */\n  --radius-xl: 16px;  /* hero illustration container */\n  --radius-pill: 9999px;\n  --radius-full: 9999px;\n\n  /* Elevation — color-block first, shadow rare */\n  --shadow-none: none;\n  --shadow-soft: 0 1px 3px rgba(20, 20, 19, 0.08);\n  --shadow-card: 0 2px 12px rgba(20, 20, 19, 0.06);\n\n  /* Layout */\n  --container-max: 1200px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(0.32, 0.08, 0.24, 1) /* @kind other */;\n  --duration-fast: 120ms /* @kind other */;\n  --duration-base: 200ms /* @kind other */;\n}\n\n<\u002Fstyle>\n  <script src=\"d5d3efa5-23a6-4261-8ca9-78652ba5ffb2\"><\u002Fscript>\n  <script src=\"12f2c7a8-448a-4384-bd45-d2c5cb93d9ab\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;background:var(--canvas);}\n    .sheet{position:relative;overflow:hidden;background:var(--canvas);}\n    .sheet > *{min-height:0 !important;}\n    @page{ size:A4 landscape; margin:8mm; }\n    @media print{\n      *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }\n      html,body{ background:#fff !important; }\n      .sheet{ break-after:page; page-break-after:always; }\n      .sheet:last-child{ break-after:auto; page-break-after:auto; }\n    }\n  <\u002Fstyle>\n  <script>\n  addEventListener('load', () => { (async () => {\n    try { await document.fonts.ready; } catch(e){}\n    const start = Date.now();\n    await new Promise(res => {\n      const tick = () => {\n        const sheets = document.querySelectorAll('.sheet');\n        const ready = sheets.length >= 6 &&\n          [...sheets].every(s => s.getBoundingClientRect().height > 120);\n        if (ready || Date.now() - start > 9000) res(); else setTimeout(tick, 150);\n      };\n      tick();\n    });\n    const imgs = Array.from(document.images).filter(i => !i.complete);\n    await Promise.race([\n      Promise.allSettled(imgs.map(i => i.decode().catch(()=>{}))),\n      new Promise(r => setTimeout(r, 6000)),\n    ]);\n    // release forced viewport heights, then fit each screen to the printable column\n    document.querySelectorAll('[style*=\"100vh\"]').forEach(el => { el.style.minHeight='0'; el.style.height='auto'; });\n    document.querySelectorAll('.sheet').forEach(s => {\n      const w = s.firstElementChild ? s.firstElementChild.scrollWidth : s.scrollWidth;\n      const target = 1060;\n      if (w > target) s.style.zoom = (target / w).toFixed(4);\n    });\n    setTimeout(() => window.print(), 700);\n  })(); });\n  <\u002Fscript>\n<\u002Fhelmet>\n\n<div class=\"sheet\"><dc-import name=\"Dashboard principal\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<div class=\"sheet\"><dc-import name=\"Dashboard\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<div class=\"sheet\"><dc-import name=\"Liste des projets\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<div class=\"sheet\"><dc-import name=\"Fiche projet\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<div class=\"sheet\"><dc-import name=\"Calendrier Gantt\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<div class=\"sheet\"><dc-import name=\"Formulaire rapport\" hint-size=\"100%,640px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
