  <link rel="stylesheet" href="_ds/claude-design-system-281e218e-ac68-4f62-81c1-674eeab0575a/styles.css">
  <script src="_ds/claude-design-system-281e218e-ac68-4f62-81c1-674eeab0575a/_ds_bundle.js"></script>
  <script src="proto.js"></script>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;background:var(--canvas);}
    .sheet{position:relative;overflow:hidden;background:var(--canvas);}
    .sheet > *{min-height:0 !important;}
    @page{ size:A4 landscape; margin:8mm; }
    @media print{
      *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      html,body{ background:#fff !important; }
      .sheet{ break-after:page; page-break-after:always; }
      .sheet:last-child{ break-after:auto; page-break-after:auto; }
    }
  </style>
  <script>
  addEventListener('load', () => { (async () => {
    try { await document.fonts.ready; } catch(e){}
    const start = Date.now();
    await new Promise(res => {
      const tick = () => {
        const sheets = document.querySelectorAll('.sheet');
        const ready = sheets.length >= 6 &&
          [...sheets].every(s => s.getBoundingClientRect().height > 120);
        if (ready || Date.now() - start > 9000) res(); else setTimeout(tick, 150);
      };
      tick();
    });
    const imgs = Array.from(document.images).filter(i => !i.complete);
    await Promise.race([
      Promise.allSettled(imgs.map(i => i.decode().catch(()=>{}))),
      new Promise(r => setTimeout(r, 6000)),
    ]);
    // release forced viewport heights, then fit each screen to the printable column
    document.querySelectorAll('[style*="100vh"]').forEach(el => { el.style.minHeight='0'; el.style.height='auto'; });
    document.querySelectorAll('.sheet').forEach(s => {
      const w = s.firstElementChild ? s.firstElementChild.scrollWidth : s.scrollWidth;
      const target = 1060;
      if (w > target) s.style.zoom = (target / w).toFixed(4);
    });
    setTimeout(() => window.print(), 700);
  })(); });
  </script>
</helmet>
