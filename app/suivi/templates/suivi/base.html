{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block titre %}{% trans "Lumière du Soleil — Suivi & Évaluation" %}{% endblock %}</title>
<style>
  :root{
    --coral:#cc785c; --coral-active:#a9583e;
    --canvas:#faf9f5; --surface-soft:#f5f0e8; --surface-card:#efe9de;
    --hairline:#e6dfd8; --ink:#141413; --body:#3d3a34; --muted:#73695e;
    --green:#2f7d44; --amber:#9a6a1f; --red:#b23b3b;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--canvas);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;}
  header.topbar{display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;background:var(--surface-soft);border-bottom:1px solid var(--hairline);}
  .brand{font-weight:700;letter-spacing:.3px;}
  .brand .accent{color:var(--coral);}
  .lang-switch{display:flex;gap:6px;align-items:center;}
  .lang-switch button{border:1px solid var(--hairline);background:#fff;border-radius:6px;
    padding:4px 10px;font-size:13px;cursor:pointer;color:var(--muted);}
  .lang-switch button.active{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600;}
  main{max-width:1100px;margin:0 auto;padding:36px 24px;}
</style>
{% block styles %}{% endblock %}
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="accent">●</span> {% trans "Lumière du Soleil" %} · {% trans "Suivi-évaluation" %}</div>
  <form action="{% url 'set_language' %}" method="post" class="lang-switch">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.get_full_path }}">
    <button type="submit" name="language" value="fr" {% if LANGUAGE_CODE == 'fr' %}class="active"{% endif %}>FR</button>
    <button type="submit" name="language" value="en" {% if LANGUAGE_CODE == 'en' %}class="active"{% endif %}>EN</button>
  </form>
</header>
<main>
{% block contenu %}{% endblock %}
</main>
</body>
</html>
