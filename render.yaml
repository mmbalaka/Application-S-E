# Blueprint de déploiement Render — Lumière du Soleil (application S&E)
# Render lit ce fichier pour créer automatiquement le service web + la base de données.

databases:
  - name: lumiere-db
    plan: free
    databaseName: lumiere
    user: lumiere

services:
  - type: web
    name: lumiere-du-soleil
    runtime: python
    plan: free
    rootDir: app
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumiere-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render génère une clé secrète aléatoire
      - key: DJANGO_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DJANGO_ADMIN_EMAIL
        value: manamboba.balaka@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false                  # à saisir toi-même dans le tableau de bord (secret)
